<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗 For You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080812;
  overflow: hidden;
  font-family: 'Cormorant Garamond', 'Noto Serif SC', Georgia, serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  cursor: pointer;
}

/* ========== Canvas ========== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
}

/* ========== Text Overlay ========== */
.text-layer {
  position: fixed;
  z-index: 2;
  text-align: center;
  pointer-events: none;
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.title {
  font-size: clamp(36px, 8vw, 72px);
  font-weight: 600;
  font-style: italic;
  background: linear-gradient(135deg, #ff6b9d, #ff2d78, #ff6b9d, #ffb3c6);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 6px;
  animation: gradientShift 4s ease-in-out infinite, breathe 3s ease-in-out infinite;
  filter: drop-shadow(0 0 40px rgba(255, 107, 157, 0.3));
}

.subtitle {
  font-size: clamp(15px, 2.5vw, 22px);
  color: rgba(255, 200, 215, 0.6);
  letter-spacing: 6px;
  font-weight: 400;
  animation: fadeUp 2s 1s both;
}

.love-message {
  margin-top: 8px;
  font-size: clamp(13px, 1.6vw, 18px);
  color: rgba(255, 200, 220, 0.35);
  letter-spacing: 3px;
  font-weight: 400;
  font-style: italic;
  animation: fadeUp 2s 2.5s both;
}

.click-hint {
  margin-top: 10px;
  font-size: clamp(11px, 1.2vw, 14px);
  color: rgba(255, 180, 200, 0.2);
  letter-spacing: 2px;
  animation: fadeUp 2s 4s both, hintPulse 3s ease-in-out 5s infinite;
}

/* ========== Animations ========== */
@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes hintPulse {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 0.5; }
}

/* ========== Responsive ========== */
@media (max-width: 480px) {
  .title { letter-spacing: 3px; }
  .subtitle { letter-spacing: 3px; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="text-layer">
  <div class="title">I Love You</div>
  <div class="subtitle">—  Forever —</div>
  <div class="love-message">You are the poetry I never knew how to write</div>
  <div class="click-hint">✦  click anywhere to spread love  ✦</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, time = 0;

/* ==================== Setup ==================== */
const particles = [];
const hearts = [];
const stars = [];
const petals = [];
const sparkles = [];
const ripples = [];
const mainHeartParticles = [];

/* ==================== Resize ==================== */
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  createStars();
  rebuildMainHeart();
}
resize();
window.addEventListener('resize', resize);

/* ==================== Heart Math ==================== */
function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
function heartY(t) {
  return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
}

/* ==================== Star Field ==================== */
function createStars() {
  stars.length = 0;
  const count = Math.floor((W * H) / 3000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.8 + 0.2,
      speed: Math.random() * 0.02 + 0.005,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function drawStars() {
  stars.forEach(s => {
    const flicker = 0.5 + Math.sin(time * s.speed * 3 + s.phase) * 0.5;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 220, 240, ${s.alpha * flicker})`;
    ctx.fill();
  });
}

/* ==================== Main Heart ==================== */
function rebuildMainHeart() {
  mainHeartParticles.length = 0;
  const cx = W / 2;
  const cy = H / 2 - 10;
  const scale = Math.min(W, H) / 50;

  // Outline
  for (let t = 0; t < Math.PI * 2; t += 0.03) {
    const x = cx + heartX(t) * scale;
    const y = cy + heartY(t) * scale;
    mainHeartParticles.push({
      x, y, baseX: x, baseY: y,
      angle: t, type: 'outline'
    });
  }
  // Inner fill
  for (let i = 0; i < 400; i++) {
    const t = Math.random() * Math.PI * 2;
    const r = Math.random() * 0.95;
    const x = cx + heartX(t) * scale * r;
    const y = cy + heartY(t) * scale * r;
    mainHeartParticles.push({
      x, y, baseX: x, baseY: y,
      angle: t + r * 2, type: 'fill'
    });
  }
}

function drawMainHeart() {
  const breathe = 1 + Math.sin(time * 1.8) * 0.035;
  const cx = W / 2;
  const cy = H / 2 - 10;

  // --- Outer glow ---
  const glowRadius = Math.min(W, H) * 0.22 * breathe;
  const grad = ctx.createRadialGradient(cx, cy - 10, glowRadius * 0.3, cx, cy - 10, glowRadius * 1.1);
  grad.addColorStop(0, 'rgba(255, 80, 140, 0.03)');
  grad.addColorStop(0.5, 'rgba(255, 40, 120, 0.06)');
  grad.addColorStop(1, 'rgba(255, 20, 100, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // --- Particles ---
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(breathe, breathe);
  ctx.translate(-cx, -cy);

  const baseHue = 340 + Math.sin(time * 0.5) * 10;

  mainHeartParticles.forEach(p => {
    const wobbleX = Math.sin(time * 2.5 + p.angle * 4) * 1.8;
    const wobbleY = Math.cos(time * 2.2 + p.angle * 3.5) * 1.2;

    if (p.type === 'outline') {
      const alpha = 0.6 + Math.sin(time * 2 + p.angle * 3) * 0.3;
      const hue = baseHue + Math.sin(p.angle * 2) * 15;
      ctx.beginPath();
      ctx.arc(p.baseX + wobbleX, p.baseY + wobbleY, 2.2, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue}, 100%, 70%, ${alpha})`;
      ctx.fill();

      // Glow
      ctx.beginPath();
      ctx.arc(p.baseX + wobbleX, p.baseY + wobbleY, 6, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue}, 100%, 65%, ${alpha * 0.12})`;
      ctx.fill();
    } else {
      const alpha = 0.35 + Math.sin(time * 1.5 + p.angle) * 0.25;
      const hue = baseHue + Math.sin(p.angle) * 10;
      ctx.beginPath();
      ctx.arc(p.baseX + wobbleX * 0.6, p.baseY + wobbleY * 0.4, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue}, 90%, 72%, ${alpha})`;
      ctx.fill();
    }
  });

  ctx.restore();
}

/* ==================== Floating Hearts ==================== */
class FloatingHeart {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = H + 30 + Math.random() * 40;
    this.size = Math.random() * 18 + 8;
    this.speed = Math.random() * 0.8 + 0.3;
    this.opacity = Math.random() * 0.25 + 0.08;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = Math.random() * 0.015 + 0.008;
    this.hue = 330 + Math.random() * 30;
    this.phase = Math.random() * Math.PI * 2;
  }
  update() {
    this.y -= this.speed;
    this.wobble += this.wobbleSpeed;
    this.x += Math.sin(this.wobble) * 0.6;
    if (this.y < -50) this.reset();
  }
  draw() {
    const pulse = 0.8 + Math.sin(time * 2 + this.phase) * 0.2;
    ctx.save();
    ctx.globalAlpha = this.opacity * pulse;
    ctx.translate(this.x, this.y);
    ctx.scale(this.size / 16 * pulse, this.size / 16 * pulse);
    ctx.beginPath();
    for (let t = 0; t < Math.PI * 2; t += 0.05) {
      const x = heartX(t);
      const y = heartY(t);
      t === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = `hsl(${this.hue}, 100%, 75%)`;
    ctx.fill();
    ctx.restore();
  }
}

/* ==================== Falling Petals ==================== */
class Petal {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : -20;
    this.size = Math.random() * 8 + 4;
    this.speed = Math.random() * 1 + 0.5;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.03;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = Math.random() * 0.02 + 0.01;
    this.alpha = Math.random() * 0.3 + 0.1;
    this.hue = 340 + Math.random() * 20;
  }
  update() {
    this.y += this.speed;
    this.wobble += this.wobbleSpeed;
    this.x += Math.sin(this.wobble) * 0.5;
    this.rot += this.rotSpeed;
    if (this.y > H + 20) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.scale(this.size / 10, this.size / 10);
    ctx.beginPath();
    // Teardrop petal shape
    ctx.moveTo(0, -4);
    ctx.bezierCurveTo(4, -2, 5, 2, 0, 4);
    ctx.bezierCurveTo(-5, 2, -4, -2, 0, -4);
    ctx.fillStyle = `hsl(${this.hue}, 90%, 75%)`;
    ctx.fill();
    ctx.restore();
  }
}

/* ==================== Click Burst ==================== */
function burstAt(x, y) {
  const colors = ['#ff6b9d','#ff8fab','#ffb3c6','#ff477e','#ffd6e0','#fff0f3','#ff2d78','#ff9eb5'];
  // Particles
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 1.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      size: Math.random() * 5 + 2,
      life: Math.floor(Math.random() * 80 + 50),
      maxLife: 130,
      color: colors[Math.floor(Math.random() * colors.length)],
      trail: [],
    });
  }

  // Ripple
  ripples.push({ x, y, r: 0, maxR: Math.min(W, H) * 0.15, life: 1 });

  // Sparkles
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 30;
    sparkles.push({
      x: x + Math.cos(angle) * dist,
      y: y + Math.sin(angle) * dist,
      size: Math.random() * 4 + 2,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      phase: Math.random() * Math.PI * 2,
    });
  }

  // Small hearts burst
  for (let i = 0; i < 5; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 60 + 20;
    hearts.push(new BurstHeart(x + Math.cos(angle) * dist, y + Math.sin(angle) * dist));
  }
}

class BurstHeart {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.life = 1;
    this.decay = Math.random() * 0.015 + 0.01;
    this.size = Math.random() * 12 + 8;
    this.hue = 330 + Math.random() * 30;
  }
  update() {
    this.life -= this.decay;
    this.y -= 0.5;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.translate(this.x, this.y);
    ctx.scale(this.size / 16, this.size / 16);
    ctx.beginPath();
    for (let t = 0; t < Math.PI * 2; t += 0.05) {
      const x = heartX(t);
      const y = heartY(t);
      t === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.life})`;
    ctx.fill();
    ctx.restore();
  }
  get dead() { return this.life <= 0; }
}

document.addEventListener('click', burstAt);

/* ==================== Init ==================== */
for (let i = 0; i < 20; i++) hearts.push(new FloatingHeart());
for (let i = 0; i < 12; i++) petals.push(new Petal(true));

/* ==================== Main Loop ==================== */
function animate() {
  // Fade trail
  ctx.fillStyle = 'rgba(8, 8, 18, 0.12)';
  ctx.fillRect(0, 0, W, H);

  time += 0.016;

  // Stars
  drawStars();

  // Petals
  petals.forEach(p => { p.update(); p.draw(); });

  // Floating hearts
  hearts.forEach(h => {
    if (h instanceof BurstHeart) {
      h.update(); h.draw();
    } else {
      h.update(); h.draw();
    }
  });

  // Main heart
  drawMainHeart();

  // Click particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.04;
    p.life--;

    const alpha = Math.max(0, p.life / p.maxLife);
    const size = p.size * alpha;
    ctx.save();
    ctx.globalAlpha = alpha * 0.8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Glow trail
    ctx.save();
    ctx.globalAlpha = alpha * 0.2;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, size * 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (p.life <= 0) particles.splice(i, 1);
  }

  // Ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.r += Math.min(W, H) * 0.005;
    r.life -= 0.015;
    if (r.life <= 0) { ripples.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 180, 210, ${r.life * 0.4})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Sparkles
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.life -= s.decay;
    if (s.life <= 0) { sparkles.splice(i, 1); continue; }
    const twinkle = 0.5 + Math.sin(time * 5 + s.phase) * 0.5;
    ctx.save();
    ctx.globalAlpha = s.life * twinkle;
    ctx.fillStyle = '#fff';
    // Star shape
    ctx.translate(s.x, s.y);
    ctx.beginPath();
    for (let j = 0; j < 4; j++) {
      const a = (j / 4) * Math.PI * 2 - Math.PI / 2;
      ctx.lineTo(Math.cos(a) * s.size, Math.sin(a) * s.size);
      const a2 = a + Math.PI / 4;
      ctx.lineTo(Math.cos(a2) * s.size * 0.3, Math.sin(a2) * s.size * 0.3);
    }
    ctx.closePath();
    ctx.fillStyle = `hsl(${340 + Math.random() * 20}, 100%, 85%)`;
    ctx.fill();
    ctx.restore();
  }

  // Clean up burst hearts
  for (let i = hearts.length - 1; i >= 0; i--) {
    if (hearts[i] instanceof BurstHeart && hearts[i].dead) {
      hearts.splice(i, 1);
    }
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
